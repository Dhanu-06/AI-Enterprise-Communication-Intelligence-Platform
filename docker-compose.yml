# Full stack — AI Enterprise Communication Intelligence Platform
# Usage: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: comm_intel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comm_intel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comm_intel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-comm_intel_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-comm_intel} -d ${POSTGRES_DB:-comm_intel_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - comm_intel_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: comm_intel_elasticsearch
    restart: unless-stopped
    environment:
      node.name: comm_intel_es01
      cluster.name: comm-intel-cluster
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms${ELASTICSEARCH_HEAP_SIZE:-512m} -Xmx${ELASTICSEARCH_HEAP_SIZE:-512m}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - comm_intel_network

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: comm_intel_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - comm_intel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comm_intel_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - comm_intel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        BACKEND_INTERNAL_URL: http://backend:8000
    container_name: comm_intel_frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - comm_intel_network

volumes:
  postgres_data:
    name: comm_intel_postgres_data
  elasticsearch_data:
    name: comm_intel_elasticsearch_data
  chroma_data:
    name: comm_intel_chroma_data
  backend_uploads:
    name: comm_intel_backend_uploads
  huggingface_cache:
    name: comm_intel_huggingface_cache

networks:
  comm_intel_network:
    name: comm_intel_network
    driver: bridge
